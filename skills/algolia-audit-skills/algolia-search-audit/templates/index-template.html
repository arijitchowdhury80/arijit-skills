/* ═══════════════════════════════════════════════════

   GLOW EFFECT — mouse-tracking conic-gradient border

   CSS in algolia-brand.css (.glow-card)

   Call initGlowEffect(containerEl) on any container with .glow-card children.

═══════════════════════════════════════════════════ */

function initGlowEffect(container) {

  if (!container || container.dataset.glowInit) return;

  container.dataset.glowInit = '1';

  const cards = container.querySelectorAll('.glow-card');

  cards.forEach(card => {

    card.addEventListener('mousemove', (e) => {

      const rect = card.getBoundingClientRect();

      const cx = rect.left + rect.width / 2;

      const cy = rect.top  + rect.height / 2;

      const angle = Math.atan2(e.clientY - cy, e.clientX - cx) * (180 / Math.PI) + 90;

      card.style.setProperty('--glow-angle', angle + 'deg');

      card.classList.add('glow-active');

    });

    card.addEventListener('mouseleave', () => {

      card.classList.remove('glow-active');

    });

  });

}



/* ═══════════════════════════════════════════════════

   ANIMATED GRID BACKGROUND — subtle pulsing squares

   Vanilla JS replication of magicui/animated-grid-pattern.

   Fixed behind all content at z-index:-1.

═══════════════════════════════════════════════════ */

function initAnimatedGrid() {

  if (typeof document.createElementNS !== 'function' || !document.body) return;

  const GRID = 44, NUM = 45, MAX_OP = 0.55, MIN_OP = 0.12;

  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');

  svg.id = 'animated-grid';

  svg.setAttribute('xmlns','http://www.w3.org/2000/svg');



  // Base grid lines

  const defs = document.createElementNS('http://www.w3.org/2000/svg','defs');

  defs.innerHTML = `<pattern id="agp" x="0" y="0" width="${GRID}" height="${GRID}" patternUnits="userSpaceOnUse">

    <path d="M${GRID} 0 L 0 0 0 ${GRID}" fill="none" stroke="rgba(0,61,255,0.07)" stroke-width="0.8"/>

  </pattern>`;

  svg.appendChild(defs);



  const bg = document.createElementNS('http://www.w3.org/2000/svg','rect');

  bg.setAttribute('width','100%'); bg.setAttribute('height','100%');

  bg.setAttribute('fill','url(#agp)');

  svg.appendChild(bg);



  // Animated squares

  const squares = Array.from({length: NUM}, () => {

    const r = document.createElementNS('http://www.w3.org/2000/svg','rect');

    r.setAttribute('width', GRID-1); r.setAttribute('height', GRID-1);

    r.style.opacity = '0';

    r.style.fill = 'rgba(0,61,255,0.10)';

    r.style.borderRadius = '2px';

    svg.appendChild(r);

    return r;

  });



  document.body.insertBefore(svg, document.body.firstChild);



  function reposition(r) {

    const cols = Math.ceil(window.innerWidth / GRID) + 1;

    const rows = Math.ceil(window.innerHeight / GRID) + 1;

    r.setAttribute('x', Math.floor(Math.random()*cols) * GRID);

    r.setAttribute('y', Math.floor(Math.random()*rows) * GRID);

  }



  function pulse(r, delay) {

    setTimeout(() => {

      reposition(r);

      r.style.transition = 'opacity 1.8s ease';

      r.style.opacity = String(MIN_OP + Math.random()*(MAX_OP-MIN_OP));

      setTimeout(() => {

        r.style.opacity = '0';

        setTimeout(() => pulse(r, 0), 2000 + Math.random()*1500);

      }, 1800 + Math.random()*800);

    }, delay);

  }



  squares.forEach((r, i) => pulse(r, i * 200 + Math.random()*300));

}



/* ═══════════════════════════════════════════════════

   DONUT CHART — interactive traffic sources

   Call initDonutChart(svgId) after DOM insertion.

═══════════════════════════════════════════════════ */

function initDonutChart(svgId) {

  const svg = document.getElementById(svgId);

  if (!svg || svg.dataset.donutInit) return;

  svg.dataset.donutInit = '1';



  // Add drop-shadow filter to SVG defs

  const defs = document.createElementNS('http://www.w3.org/2000/svg','defs');

  defs.innerHTML = `<filter id="${svgId}-shadow" x="-40%" y="-40%" width="180%" height="180%">

    <feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="rgba(0,0,0,0.30)" flood-opacity="1"/>

  </filter>`;

  svg.prepend(defs);



  const segs = svg.querySelectorAll('.donut-seg');

  const cp   = document.getElementById(svgId + '-cp');

  const cs   = document.getElementById(svgId + '-cs');

  if (!cp || !cs) return;

  const dp = cp.textContent, ds = cs.textContent, dfill = 'var(--gray)';



  // FIX: Use scale from SVG center (not translate) — no flickering

  // SVG center is at cx=110,cy=110 — set transform-origin on each segment

  segs.forEach(seg => {

    seg.style.transformOrigin = '110px 110px';

    seg.style.transition = 'transform 0.3s cubic-bezier(0.34,1.4,0.64,1), filter 0.2s ease';

    seg.style.cursor = 'pointer';

  });



  const activate = (idx) => {

    const seg = svg.querySelector(`.donut-seg[data-idx="${idx}"]`);

    if (!seg) return;

    seg.style.transform = 'scale(1.12)';

    seg.style.filter = `url(#${svgId}-shadow) brightness(1.06)`;

    cp.textContent = seg.dataset.pct + '%';

    cs.textContent = seg.dataset.name;

    cp.style.fill = seg.getAttribute('fill');

    // Legend: background highlight, no movement

    const row = document.querySelector(`[data-legend="${svgId}-${idx}"]`);

    if (row) {

      row.style.background = seg.getAttribute('fill') + '14';

      row.style.borderRadius = '6px';

      row.style.transition = 'background 0.2s ease';

    }

  };



  const deactivate = (idx) => {

    const seg = svg.querySelector(`.donut-seg[data-idx="${idx}"]`);

    if (seg) { seg.style.transform = ''; seg.style.filter = ''; }

    cp.textContent = dp; cs.textContent = ds; cp.style.fill = dfill;

    const row = document.querySelector(`[data-legend="${svgId}-${idx}"]`);

    if (row) row.style.background = '';

  };



  // Segment hover

  segs.forEach(seg => {

    const idx = seg.dataset.idx;

    seg.addEventListener('mouseenter', () => activate(idx));

    seg.addEventListener('mouseleave', () => deactivate(idx));

  });



  // Legend hover → donut (bidirectional)

  document.querySelectorAll(`[data-legend^="${svgId}-"]`).forEach(row => {

    const idx = row.dataset.legend.replace(svgId + '-', '');

    row.style.cursor = 'pointer';

    row.style.borderRadius = '6px';

    row.style.transition = 'background 0.2s ease';

    row.style.padding = '5px 6px';

    row.style.margin = '0 -6px';

    row.addEventListener('mouseenter', () => activate(idx));

    row.addEventListener('mouseleave', () => deactivate(idx));

  });

}



/* ═══════════════════════════════════════════════════

   ANIMATED BACKGROUND — sliding highlight for card grids

   CSS defined in algolia-brand.css (.ab-container, .ab-item, .ab-highlight)

   Call initAnimatedBg(containerEl) after DOM insertion on any .ab-container.

═══════════════════════════════════════════════════ */

function initAnimatedBg(container) {

  if (!container || container.dataset.abInit) return;

  container.dataset.abInit = '1';

  const highlight = document.createElement('div');

  highlight.className = 'ab-highlight';

  container.style.position = 'relative';

  container.prepend(highlight);

  const items = container.querySelectorAll('.ab-item');

  let activeItem = null;

  items.forEach(item => {

    item.addEventListener('mouseenter', () => {

      const cRect = container.getBoundingClientRect();

      const iRect = item.getBoundingClientRect();

      highlight.style.left   = (iRect.left   - cRect.left) + 'px';

      highlight.style.top    = (iRect.top    - cRect.top)  + 'px';

      highlight.style.width  = iRect.width  + 'px';

      highlight.style.height = iRect.height + 'px';

      container.classList.add('ab-active');

      if (activeItem) activeItem.classList.remove('ab-hovered');

      activeItem = item;

      item.classList.add('ab-hovered');

    });

  });

  container.addEventListener('mouseleave', () => {

    container.classList.remove('ab-active');

    if (activeItem) { activeItem.classList.remove('ab-hovered'); activeItem = null; }

  });

}

      count: signals.length,

      children: signalTypes.map(type => ({

        id: `signal-nav-${type}`,

        count: signals.filter(x => x.type === type).length,

        isSignalFilter: true,

        filterType: type

      }))

    },

    { id: 'section-quotes',      label: 'In Their Own Words', icon: '◉' },

    { id: 'section-competitive', label: 'Competitive Landscape', icon: '◎' },

    { id: 'section-opportunity', label: 'The Opportunity', icon: '◈' },

    { id: 'section-ae-brief',    label: 'AE Action Brief', icon: '◉' },

    { id: 'section-battlecard',  label: 'Battle Card', icon: '◎' },

    {

      id: 'appendix-parent', label: 'Appendix', icon: '◈', expanded: false,

      children: [

        { id: 'appendix-scoring', label: 'Full Scoring' },

        { id: 'appendix-queries', label: 'Test Queries' },

        { id: 'appendix-tech',    label: 'Full Tech Stack' },

        { id: 'section-sources',  label: 'Sources & Bibliography' },

      ]

    },

  ];



  let html = '';

  structure.forEach(item => {

    html += renderNavItem(item);

    if (item.children?.length) {

      const maxH = item.expanded ? item.children.length * 38 + 'px' : '0px';

      html += `<div class="nav-children" id="children-${item.id}" style="max-height:${maxH}">`;

      item.children.forEach(child => { html += renderNavItem(child, true); });

      html += '</div>';

    }

  });



  document.getElementById('sidebar').innerHTML = html;



  // Attach click handlers

  structure.forEach(item => {

    const el = document.getElementById(`nav-${item.id}`);

    if (!el) return;

    el.addEventListener('click', () => {

      if (item.children?.length) {

        toggleNavChildren(item.id);

      } else {

        scrollToSection(item.id);

      }

    });

    if (item.children?.length) {

      item.children.forEach(child => {

        const cel = document.getElementById(`nav-${child.id}`);

        if (!cel) return;

        if (child.isSignalFilter) {

          cel.addEventListener('click', (e) => {

            e.stopPropagation();

            scrollToSection('section-signals');

            setTimeout(() => filterSignals(child.filterType), 400);

          });

        } else {

          cel.addEventListener('click', (e) => {

            e.stopPropagation();

            scrollToSection(child.id);

          });

        }

      });

    }

  });

}



function renderNavItem(item, isChild = false) {

  const sev = item.severity ? `<span class="sev-dot sev-dot-${item.severity}"></span>` : '';

  const icon = !isChild && item.icon ? `<span class="nav-icon">${item.icon}</span>` : '';

  const badge = item.badge ? `<span class="nav-badge badge-${item.badge}">${item.badgeText}</span>` : '';

  const count = item.count != null ? `<span class="nav-count">${item.count}</span>` : '';

  const toggle = item.children?.length

    ? `<span class="nav-toggle ${item.expanded ? 'open' : ''}" id="toggle-${item.id}">›</span>`

    : '';

  return `<div class="nav-item" id="nav-${item.id}" role="button" tabindex="0">

    ${icon}${sev}

    <span class="nav-label">${escHtml(item.label)}</span>

    ${badge}${count}${toggle}

  </div>`;

}



function toggleNavChildren(id) {

  const children = document.getElementById(`children-${id}`);

  const toggle   = document.getElementById(`toggle-${id}`);

  if (!children) return;

  const isOpen = children.style.maxHeight !== '0px';

  children.style.maxHeight = isOpen ? '0px' : (children.scrollHeight + 'px');

  if (toggle) toggle.classList.toggle('open', !isOpen);

}



function scrollToSection(id) {

  const el = document.getElementById(id);

  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });

}



/* ═══════════════════════════════════════════════════

   SCROLL SPY

═══════════════════════════════════════════════════ */

function initScrollSpy() {

  const sections = document.querySelectorAll('.audit-section');

  const observer = new IntersectionObserver(entries => {

    entries.forEach(entry => {

      if (entry.isIntersecting) {

        document.querySelectorAll('.nav-item.active').forEach(el => el.classList.remove('active'));

        const navEl = document.getElementById(`nav-${entry.target.id}`);

        if (navEl) {

          navEl.classList.add('active');

          // Expand parent if needed

          const children = navEl.closest('.nav-children');

          if (children) {

            const parentId = children.id.replace('children-', '');

            const parentChildren = document.getElementById(`children-${parentId}`);

            if (parentChildren && parentChildren.style.maxHeight === '0px') {

              toggleNavChildren(parentId);

            }

          }

        }

      }

    });

  }, { rootMargin: `-${parseInt(getComputedStyle(document.documentElement).getPropertyValue('--topbar-h')) + 20}px 0px -60% 0px` });

  sections.forEach(s => observer.observe(s));

}

   SIGNAL FILTER

let currentFilter = 'all';



function filterSignals(type) {

  currentFilter = type;

  document.querySelectorAll('.filter-btn').forEach(btn => {

    btn.classList.toggle('active', btn.dataset.filter === type);

  });

  document.querySelectorAll('.signal-card').forEach(card => {

    const show = (type === 'all' || card.dataset.type === type);

    card.style.display = show ? 'block' : 'none';

  });

}

function initLightbox() {

  const lb    = document.getElementById('lightbox');

  const img   = document.getElementById('lightbox-img');

  const cap   = document.getElementById('lightbox-caption');

  const close = document.getElementById('lightbox-close');



  document.querySelectorAll('.finding-screenshot').forEach(wrap => {

    wrap.addEventListener('click', () => {

      const i = wrap.querySelector('img');

      if (!i) return;

      img.src = i.src;

      img.alt = i.alt;

      cap.textContent = i.dataset.caption || i.alt || '';

      lb.classList.add('open');

      document.body.style.overflow = 'hidden';

    });

  });



  const closeLb = () => { lb.classList.remove('open'); document.body.style.overflow = ''; img.src = ''; };

  close.addEventListener('click', closeLb);

  lb.addEventListener('click', e => { if (e.target === lb) closeLb(); });

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLb(); });

}

// Translated from 21st.dev AnimatedGradient (React) → vanilla JS/CSS

// Generates animated SVG blob circles with random CSS custom-property translate paths

function gradientBlobs(colors, speed = 14, opacity = 0.28) {

  const r = () => (Math.random() - 0.5).toFixed(3);

  const pct = () => (20 + Math.random() * 55).toFixed(1);

  const sz = () => (70 + Math.random() * 90).toFixed(0);

  const blobs = colors.map((color, i) => {

    const delay = (i * (speed / colors.length)).toFixed(1);

    const size = sz();

    return `<div class="cs-blob" style="

      top:${pct()}%;left:${pct()}%;

      width:${size}px;height:${size}px;

      --cs-speed:${speed}s;

      animation-delay:-${delay}s;

      --tx-1:${r()};--ty-1:${r()};

      --tx-2:${r()};--ty-2:${r()};

      --tx-3:${r()};--ty-3:${r()};

      --tx-4:${r()};--ty-4:${r()};

    "><svg width="100%" height="100%" viewBox="0 0 100 100" aria-hidden="true">

      <circle cx="50" cy="50" r="50" fill="${color}" opacity="${opacity}"/>

    </svg></div>`;

  }).join('');

  return `<div class="cs-blob-layer">${blobs}</div>`;

}

function sectionTraffic(D) {

  const t = D.traffic || {};

  if (!t.monthly_visits && !(t.top_channels||[]).length) return '';

  const channels = t.top_channels || [];

  const maxShare = Math.max(...channels.map(c => parseFloat(c.share) || 0), 1);

  const audience = t.audience || {};

  const age = audience.age || {};

  // Normalize gender — support both object {female, male} and demographics array [{age_group:"Female", pct:76}]
  const demoArr = t.demographics || [];
  const femaleEntry = demoArr.find(d => /^female$/i.test(d.age_group));
  const maleEntry   = demoArr.find(d => /^male$/i.test(d.age_group));
  const genderFromDemo = (femaleEntry || maleEntry)
    ? { female: femaleEntry?.pct, male: maleEntry?.pct }
    : null;
  const gender = genderFromDemo || audience.gender || {};

  const maxAge = Math.max(...Object.values(age).map(Number), 1);



  // ── Build donut segments (top 4 + Other) ─────────────────────────────────

  const DONUT_KEYS = ['Direct','Organic Search','Paid Search','Social'];

  const DONUT_COLORS = {

    'Direct':'var(--blue)','Organic Search':'var(--green)','Paid Search':'var(--amber)',

    'Social':'var(--violet)','Other':'var(--chart-other)'

  };

  const donutData = []; let otherPct = 0;

  channels.forEach(c => {

    const nm = c.source || c.channel || '';

    const pct = parseFloat(c.share) || 0;

    if (DONUT_KEYS.includes(nm)) donutData.push({name:nm, pct, color:DONUT_COLORS[nm]});

    else otherPct += pct;

  });

  if (otherPct > 0.05) donutData.push({name:'Other', pct:Math.round(otherPct*10)/10, color:DONUT_COLORS['Other']});



  // ── Algolia angle: search % ───────────────────────────────────────────────

  const searchPct = donutData.filter(d=>['Organic Search','Paid Search'].includes(d.name))

    .reduce((s,d)=>s+d.pct, 0);

  const searchPctStr = Math.round(searchPct*10)/10;



  // ── SVG arc path helper ───────────────────────────────────────────────────

  const cx=110, cy=110, outerR=90, innerR=56;

  const toRad = deg => deg * Math.PI / 180;

  const arcPath = (s, e) => {

    const large = (e-s) > 180 ? 1 : 0;

    const [os,oe,is,ie] = [s,e,s,e].map((d,i) => {

      const r = i<2 ? outerR : innerR;

      return [cx+r*Math.cos(toRad(d)), cy+r*Math.sin(toRad(d))];

    });

    return `M${os[0]},${os[1]} A${outerR},${outerR} 0 ${large},1 ${oe[0]},${oe[1]} L${ie[0]},${ie[1]} A${innerR},${innerR} 0 ${large},0 ${is[0]},${is[1]}Z`;

  };

    const sweep = (d.pct / 100) * 360;

    const endAngle = angle + sweep;

    const mid = angle + sweep / 2;

    const tx = Math.cos(toRad(mid)) * 11;

    const ty = Math.sin(toRad(mid)) * 11;

    const path = arcPath(angle, endAngle - 0.3); // tiny gap between segments

    angle = endAngle;

    return `<path class="donut-seg" d="${path}" fill="${d.color}"

      data-name="${escHtml(d.name)}" data-pct="${d.pct}"

      data-tx="${tx.toFixed(2)}" data-ty="${ty.toFixed(2)}" data-idx="${idx}"/>`;

  const legendHtml = donutData.map((d, idx) => `

    <div data-legend="${svgId}-${idx}"

         style="display:flex;align-items:center;gap:8px;padding:5px 0;cursor:default;transition:font-weight 0.1s;">

      <span style="width:10px;height:10px;border-radius:50%;background:${d.color};flex-shrink:0;display:inline-block;"></span>

      <span style="${T.bodySmMid14};flex:1;">${escHtml(d.name)}</span>

    </div>`).join('');



  return `<section id="section-traffic" class="audit-section">

function sectionFinancials(D) {

  const f  = D.financials       || {};

  // ── Build revenue_3y — prefer full array, fall back to individual year fields ──
  let _rev3y = f.revenue_3y;
  if (!_rev3y?.length) {
    const _fmt = v => v == null ? null : typeof v === 'number' ? '$' + (v >= 1e9 ? (v/1e9).toFixed(1)+'B' : (v/1e6).toFixed(1)+'M') : String(v);
    const _rows = [
      f.revenue_fy2022 != null ? {year:'FY2022', revenue: _fmt(f.revenue_fy2022)} : null,
      f.revenue_fy2023 != null ? {year:'FY2023', revenue: _fmt(f.revenue_fy2023)} : null,
      f.revenue_fy2024 != null ? {year:'FY2024', revenue: _fmt(f.revenue_fy2024)} : null,
      f.revenue_fy2025 != null ? {year:'FY2025', revenue: _fmt(f.revenue_fy2025)} : null,
    ].filter(Boolean);
    if (_rows.length) _rev3y = _rows;
  }

  if (!_rev3y?.length && !f.annual_revenue_estimate && !f.revenue_current) return '';

  const revChron = [...(_rev3y || [])];
  const latest   = revChron[revChron.length - 1] || {};
  const nYrs     = revChron.length;

  // ── Parse $B / % string to number ─────────────────────────────────────────
  function pv(s) {
    if (!s || s === '—' || s === '\u2014') return null;
    const str = String(s);
    const neg = str.includes('\u2212') || str.startsWith('-');
    const n = parseFloat(str.replace(/[^0-9.]/g, ''));
    if (isNaN(n)) return null;
    return neg ? -n : n; // returns raw number (B stays as B, % stays as %)
  }

  function yoyStr(cur, prev) {
    const c = pv(cur), p = pv(prev);
    if (c === null || p === null || p === 0) return '';
    const pct = Math.round(((c - p) / Math.abs(p)) * 100);
    const up = pct > 0;
    return `<span style="color:${up?'var(--green)':'var(--red)'};font-size:11px;font-weight:700;">${up?'↑':'↓'} ${Math.abs(pct)}%</span>`;
  }

  // ── Per-year metric arrays ─────────────────────────────────────────────────
  const rvVals = revChron.map(r => pv(r.revenue)          || 0);
  const gpVals = revChron.map(r => pv(r.gross_profit)     || 0);
  const ebVals = revChron.map(r => pv(r.ebitda)           || 0);
  const opVals = revChron.map(r => pv(r.operating_income) || 0);
  const niVals = revChron.map(r => pv(r.net_income)       || 0);

  // Margins derived (all valid — calculated from sourced numbers)
  const gmVals = revChron.map((r,i) => rvVals[i]>0 ? Math.round((gpVals[i]/rvVals[i])*1000)/10 : null);
  const emVals = revChron.map((r,i) => rvVals[i]>0 ? Math.round((ebVals[i]/rvVals[i])*1000)/10 : null);
  const nmVals = revChron.map(r => pv(r.net_margin));

  // ── SVG Composite Chart ────────────────────────────────────────────────────
  const cW=580, cH=200, padL=46, padR=44, padT=24, padB=34;
  const plotW=cW-padL-padR, plotH=cH-padT-padB;
  const maxBarVal=56; // $B scale left axis
  const maxPctVal=20; // % scale right axis

  function bY(v){ return padT + plotH - Math.round((v/maxBarVal)*plotH); }
  function bH(v){ return Math.max(Math.round((v/maxBarVal)*plotH), 2); }
  function lY(p){ return p===null?null: padT + plotH - Math.round((p/maxPctVal)*plotH); }

  const grpW = plotW/nYrs;
  const bw = Math.max(Math.floor(grpW*0.19), 7);
  const grpPad = (grpW - 3*bw) / 4;

  const svgBars = revChron.map((r,i) => {
    const x0 = padL + i*grpW + grpPad;
    const x1 = x0 + bw + grpPad;
    const x2 = x1 + bw + grpPad;
    const isL = i===nYrs-1;
    const cRv = isL?'var(--blue)':'var(--blue-border)';
    const cGp = isL?'var(--teal)':'var(--teal-border)';
    const cEb = isL?'var(--violet)':'var(--violet-border)';
    const xLbl = padL + i*grpW + grpW/2;
    return [
      `<rect x="${x0}" y="${bY(rvVals[i])}" width="${bw}" height="${bH(rvVals[i])}" style="fill:${cRv}" rx="2"/>`,
      gpVals[i]>0?`<rect x="${x1}" y="${bY(gpVals[i])}" width="${bw}" height="${bH(gpVals[i])}" style="fill:${cGp}" rx="2"/>` : '',
      ebVals[i]>0?`<rect x="${x2}" y="${bY(ebVals[i])}" width="${bw}" height="${bH(ebVals[i])}" style="fill:${cEb}" rx="2"/>` : '',
      `<text x="${xLbl}" y="${cH-6}" text-anchor="middle" font-family="'Sora',sans-serif" font-size="10" font-weight="${isL?700:600}" style="fill:${isL?'var(--blue)':'var(--mid)'}">${escHtml(r.year)}</text>`,
    ].join('');
  }).join('');

  // EBITDA margin trend line
  const linePts = revChron.map((r,i)=>{
    const p=emVals[i]; if(p===null) return null;
    return {x: padL + i*grpW + grpW/2, y: lY(p), p};
  }).filter(Boolean);
  const linePath = linePts.length>1 ? linePts.map((pt,i)=>(i===0?`M${pt.x},${pt.y}`:`L${pt.x},${pt.y}`)).join(' ') : '';
  const lineDots = linePts.map(pt=>`<circle cx="${pt.x}" cy="${pt.y}" r="3.5" style="fill:var(--gray)" stroke="white" stroke-width="1.5"/><text x="${pt.x}" y="${pt.y-7}" text-anchor="middle" font-family="'Sora',sans-serif" font-size="9" font-weight="700" style="fill:var(--gray)">${pt.p}%</text>`).join('');

  // Grid lines + left axis
  const gridLines = [0,10,20,30,40,50].map(v=>{
    const y = padT+plotH-Math.round((v/maxBarVal)*plotH);
    return `<line x1="${padL}" y1="${y}" x2="${padL+plotW}" y2="${y}" style="stroke:var(--border)" stroke-width="0.5" stroke-dasharray="3,3"/>
            <text x="${padL-4}" y="${y+4}" text-anchor="end" font-family="'Sora',sans-serif" font-size="9" style="fill:var(--mid)">$${v}B</text>`;
  }).join('');

  // Right axis (%)
  const rightAxis = [0,5,10,15,20].map(v=>{
    const y = padT+plotH-Math.round((v/maxPctVal)*plotH);
    return `<text x="${padL+plotW+4}" y="${y+4}" text-anchor="start" font-family="'Sora',sans-serif" font-size="9" style="fill:var(--mid)">${v}%</text>`;
  }).join('');

  // Hover overlay rects + data attributes per year group
  const ttId = 'fin-tt-' + Math.random().toString(36).slice(2,6);
  const hoverRects = revChron.map((r,i) => {
    const x = padL + i*grpW;
    const em = emVals[i];
    const rv = rvVals[i], gp = gpVals[i], eb = ebVals[i];
    const rvPri = i>0?rvVals[i-1]:null, gpPri = i>0?gpVals[i-1]:null, ebPri = i>0?ebVals[i-1]:null, emPri = i>0?emVals[i-1]:null;
    const pct = (cur,pri) => pri&&pri!==0 ? Math.round(((cur-pri)/Math.abs(pri))*100) : null;
    const yoyFmt = (p) => p===null ? '' : (p>0?`↑${p}%`:`↓${Math.abs(p)}%`);
    const payload = JSON.stringify({
      year: r.year,
      rv: `$${rv.toFixed(1)}B`, rvY: yoyFmt(pct(rv,rvPri)),
      gp: gp>0?`$${gp.toFixed(1)}B`:'—', gpY: yoyFmt(pct(gp,gpPri)),
      eb: eb>0?`$${eb.toFixed(1)}B`:'—', ebY: yoyFmt(pct(eb,ebPri)),
      em: em!==null?`${em}%`:'—', emY: yoyFmt(pct(em,emPri)),
      note: r.note||''
    }).replace(/"/g,'&quot;');
    return `<rect x="${x}" y="${padT}" width="${grpW}" height="${plotH}" fill="transparent" rx="0"
      onmouseenter="(function(el,e){var d=JSON.parse(el.dataset.fin);var t=document.getElementById('${ttId}');if(!t)return;var neg=function(s){return s&&s.startsWith('\u2193');};t.innerHTML='<div style=\\'font-size:11px;font-weight:700;color:var(--gray);margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid var(--border);\\'>'+d.year+'</div><table style=\\'border-collapse:collapse;width:100%;\\'>'+[['Revenue',d.rv,d.rvY],['Gross Profit',d.gp,d.gpY],['EBITDA',d.eb,d.ebY],['EBITDA Margin',d.em,d.emY]].map(function(row){return '<tr><td style=\\'padding:2px 8px 2px 0;font-size:11px;color:var(--mid);white-space:nowrap;\\'>'+row[0]+'</td><td style=\\'padding:2px 4px;font-size:11px;font-weight:700;color:var(--gray);text-align:right;\\'>'+row[1]+'</td><td style=\\'padding:2px 0 2px 6px;font-size:11px;font-weight:700;color:'+(row[2]&&row[2].startsWith('\u2191')?'var(--green)':row[2]?'var(--red)':'var(--mid)')+';text-align:right;white-space:nowrap;\\'>'+row[2]+'</td></tr>';}).join('')+'</table>'+(d.note?'<div style=\\'margin-top:6px;padding-top:6px;border-top:1px solid var(--border);font-size:11px;color:var(--mid);line-height:1.4;\\'>'+d.note+'</div>':'');var svgEl=el.closest('svg');var rect=svgEl.getBoundingClientRect();var ex=e.clientX-rect.left;var ey=e.clientY-rect.top;var svgW=rect.width;t.style.left=(ex/svgW*100>60?'auto':'calc('+(ex/svgW*100)+'% + 8px)');t.style.right=(ex/svgW*100>60?'calc('+(100-ex/svgW*100)+'% + 8px)':'auto');t.style.top=(ey+20)+'px';t.style.display='block';})(this, event)"
      onmouseleave="(function(){var t=document.getElementById('${ttId}');if(t)t.style.display='none';})()"
      data-fin="${payload}" style="cursor:default;"/>`;
  }).join('');

  // Margin dot hover
  const mDotHover = linePts.map((pt,i) => {
    const em = pt.p, emFirst = emVals[0];
    const diff = em!==null&&emFirst!==null ? (em-emFirst).toFixed(1) : null;
    const note2 = diff!==null ? `${diff<0?'Down':'Up'} ${Math.abs(diff)}pt from ${emFirst}% in ${revChron[0].year}` : '';
    const payload2 = JSON.stringify({year: revChron[i]?.year||'', em: `${em}%`, note: note2}).replace(/"/g,'&quot;');
    return `<circle cx="${pt.x}" cy="${pt.y}" r="10" fill="transparent"
      onmouseenter="(function(el,e){var d=JSON.parse(el.dataset.mdot);var t=document.getElementById('${ttId}');if(!t)return;t.innerHTML='<div style=\\'font-size:11px;font-weight:700;color:#23263B;margin-bottom:4px;\\'>EBITDA Margin — '+d.year+'</div><div style=\\'font-size:18px;font-weight:700;color:#23263B;margin-bottom:4px;\\'>'+d.em+'</div><div style=\\'font-size:11px;color:#6B7280;\\'>'+d.note+'</div>';var svgEl=el.closest('svg');var rect=svgEl.getBoundingClientRect();t.style.left=(e.clientX-rect.left+12)+'px';t.style.top=(e.clientY-rect.top-10)+'px';t.style.right='auto';t.style.display='block';})(this,event)"
      onmouseleave="(function(){var t=document.getElementById('${ttId}');if(t)t.style.display='none';})()"
      data-mdot="${payload2}" style="cursor:crosshair;"/>`;
  }).join('');

  const svgChart = `<div style="position:relative;">
  <svg viewBox="0 0 ${cW} ${cH}" style="width:100%;height:auto;overflow:visible;" xmlns="http://www.w3.org/2000/svg">
    ${gridLines}${rightAxis}
    <line x1="${padL}" y1="${padT+plotH}" x2="${padL+plotW}" y2="${padT+plotH}" style="stroke:var(--border)" stroke-width="1"/>
    ${svgBars}
    ${linePath?`<path d="${linePath}" fill="none" style="stroke:var(--gray)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="4,2"/>`:'' }
    ${lineDots}
    <text x="${padL-2}" y="${padT-8}" text-anchor="start" font-family="'Sora',sans-serif" font-size="9" style="fill:var(--mid)">$B →</text>
    <text x="${padL+plotW+4}" y="${padT-8}" text-anchor="start" font-family="'Sora',sans-serif" font-size="9" style="fill:var(--mid)">% →</text>
    ${hoverRects}
    ${mDotHover}
  </svg>
  <div id="${ttId}" style="display:none;position:absolute;background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;box-shadow:var(--shadow);min-width:200px;max-width:260px;pointer-events:none;z-index:10;font-family:'Sora',sans-serif;"></div>
  </div>`;

  const legendHtml = `<div style="display:flex;flex-wrap:wrap;gap:14px;margin-top:6px;">
    ${[['var(--blue)','Revenue'],['var(--teal)','Gross Profit'],['var(--violet)','EBITDA'],['','EBITDA Margin % ----']].map(([c,lbl])=>
      c ? `<div style="display:flex;align-items:center;gap:5px;${T.compact};color:var(--mid);"><div style="width:10px;height:8px;background:${c};border-radius:2px;"></div>${escHtml(lbl)}</div>`
        : `<div style="display:flex;align-items:center;gap:5px;${T.compact};color:var(--mid);"><svg width="22" height="8"><line x1="0" y1="4" x2="22" y2="4" style="stroke:var(--gray)" stroke-width="1.5" stroke-dasharray="4,2"/><circle cx="11" cy="4" r="2.5" style="fill:var(--gray)"/></svg>${escHtml(lbl)}</div>`
    ).join('')}
  </div>`;

  // ── Metric Table with inline sparklines ────────────────────────────────────
  // Trend line sparkline — tiny SVG polyline showing direction over time
  function spark(vals) {
    const clean = vals.map(v => (v !== null && isFinite(v)) ? v : null);
    const defined = clean.filter(v => v !== null);
    if (defined.length < 2) return '';
    const mn = Math.min(...defined), mx = Math.max(...defined);
    const range = mx - mn || 1;
    const sw = 56, sh = 20, padX = 3, padY = 3;
    const plotW2 = sw - 2*padX, plotH2 = sh - 2*padY;
    const pts = clean.map((v, i) => {
      if (v === null) return null;
      const x = padX + (i / (clean.length - 1)) * plotW2;
      const y = padY + plotH2 - ((v - mn) / range) * plotH2;
      return `${x.toFixed(1)},${y.toFixed(1)}`;
    }).filter(Boolean);
    // Color: is last value higher or lower than first?
    const first = defined[0], last = defined[defined.length - 1];
    const col = last < first ? 'var(--red)' : last > first ? 'var(--green)' : 'var(--mid)';
    return `<svg viewBox="0 0 ${sw} ${sh}" style="width:56px;height:20px;display:block;">
      <polyline points="${pts.join(' ')}" fill="none" stroke="${col}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="${pts[pts.length-1].split(',')[0]}" cy="${pts[pts.length-1].split(',')[1]}" r="2.5" fill="${col}"/>
    </svg>`;
  }

  function mRow(label, vals, fmt, isMargin) {
    const lat = vals[vals.length-1], pri = vals[vals.length-2];
    const yoy = (lat!==null&&pri!==null&&pri!==0) ? Math.round(((lat-pri)/Math.abs(pri))*100) : null;
    const isNeg = yoy!==null&&yoy<0;
    const bg = isNeg&&!isMargin ? 'background:var(--red-light);' : '';
    const yoyHtml = yoy!==null ? `<span style="color:${yoy>0?'var(--green)':'var(--red)'};font-size:11px;font-weight:700;">${yoy>0?'↑':'↓'} ${Math.abs(yoy)}%</span>` : '';
    const cells = vals.map((v,i)=>`<td style="padding:5px 10px;text-align:right;font-size:12px;font-weight:${i===vals.length-1?700:400};color:${i===vals.length-1?'var(--gray)':'var(--mid)'};">${fmt(v)}</td>`).join('');
    return `<tr style="${bg}"><td style="padding:5px 10px;font-size:12px;font-weight:600;color:var(--gray);white-space:nowrap;">${escHtml(label)}</td>${cells}<td style="padding:5px 10px;">${spark(vals.map(v=>v||0))}</td><td style="padding:5px 10px;text-align:right;">${yoyHtml}</td></tr>`;
  }

  const fB  = v => v!==null ? `$${v.toFixed(1)}B` : '—';
  const fPt = v => v!==null ? `${v.toFixed(1)}%` : '—';

  const yhdr = revChron.map((r,i)=>`<th style="padding:7px 10px;text-align:right;${T.eyebrowSm};color:${i===nYrs-1?'var(--blue)':'var(--mid)'};">${escHtml(r.year)}</th>`).join('');

  const tableHtml = `<div class="card-3d" style="padding:0;margin-bottom:20px;overflow:hidden;">
    <table style="width:100%;border-collapse:collapse;">
      <thead><tr style="background:var(--near-white);border-bottom:2px solid var(--border);">
        <th style="padding:7px 10px;text-align:left;${T.eyebrowSm};">Metric</th>
        ${yhdr}
        <th style="padding:7px 10px;text-align:center;${T.eyebrowSm};" title="4-year trend line (FY2022 → FY2025). Red = declining, green = improving.">4yr Trend</th>
        <th style="padding:7px 10px;text-align:right;${T.eyebrowSm};" title="Year-over-year change: latest year vs prior year">YoY</th>
      </tr></thead>
      <tbody>
        ${mRow('Revenue',      rvVals, fB,  false)}
        ${mRow('Gross Profit', gpVals, fB,  false)}
        ${mRow('EBITDA',       ebVals, fB,  false)}
        ${mRow('Op. Income',   opVals, fB,  false)}
        ${mRow('Net Income',   niVals, fB,  false)}
        <tr><td colspan="${nYrs+3}" style="padding:0;background:var(--border);height:1px;"></td></tr>
        ${mRow('Gross Margin', gmVals, fPt, true)}
        ${mRow('EBITDA Margin',emVals, fPt, true)}
        ${mRow('Net Margin',   nmVals, fPt, true)}
      </tbody>
    </table>
  </div>`;

  // ── Exec quotes ────────────────────────────────────────────────────────────
  const execQuotes = (f.exec_quotes || []).slice(0, 2);
  const quotesHtml = execQuotes.map(q=>`
    <div style="padding:14px 16px;border-left:3px solid var(--blue-border);background:var(--blue-light);border-radius:0 var(--radius) var(--radius) 0;margin-bottom:10px;">
      <div style="font-size:14px;font-style:italic;color:var(--gray);line-height:1.6;margin-bottom:8px;">&ldquo;${escHtml(q.quote)}&rdquo;</div>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
        <span style="${T.eyebrowSm};color:var(--blue);">${escHtml(q.speaker)}</span>
        <span style="${T.bodySmGray12};">· ${escHtml(q.source)}</span>
        ${q.source_url?`<a href="${escHtml(q.source_url)}" target="_blank" rel="noopener" style="font-size:11px;color:var(--blue);text-decoration:none;border:1px solid var(--blue-border);border-radius:3px;padding:1px 6px;">↗ Source</a>`:''}
      </div>
    </div>`).join('');

  // ── Algolia Angle + ROI accordion ─────────────────────────────────────────
  const roi = f.roi_calc || {};
  const roiAccordion = roi.gross_profit_impact_est ? `
    <div style="margin-top:10px;">
      <button onclick="(function(btn){const b=btn.nextElementSibling;const open=b.style.display!=='none';b.style.display=open?'none':'block';btn.querySelector('span').textContent=open?'How is this calculated? ↓':'Hide calculation ↑';})(this)"
        style="background:none;border:none;padding:0;${T.compact};color:var(--blue);cursor:pointer;font-family:inherit;text-decoration:underline;text-underline-offset:2px;">
        <span>How is this calculated? ↓</span>
      </button>
      <div style="display:none;margin-top:10px;padding:12px 14px;background:var(--near-white);border:1px solid var(--border);border-radius:var(--radius);">
        <div style="${T.eyebrowSm};margin-bottom:10px;">ROI Calculation Methodology</div>
        <div style="display:grid;grid-template-columns:auto 1fr auto;gap:6px 12px;align-items:baseline;">
          <span style="${T.compact};color:var(--mid);">Total revenue</span>
          <span style="${T.compact};color:var(--mid);">${roi.revenue_basis_source ? `· ${escHtml(roi.revenue_basis_source)}` : ''}</span>
          <span style="${T.compact};font-weight:600;color:var(--gray);text-align:right;">${escHtml(roi.revenue_basis||'')}</span>
          <span style="${T.compact};color:var(--mid);">× Conversion lift</span>
          <span style="${T.compact};color:var(--amber);">${roi.lift_basis ? `· ${escHtml(roi.lift_basis)}` : ''}</span>
          <span style="${T.compact};font-weight:600;color:var(--gray);text-align:right;">${roi.lift_pct||1}%</span>
          <span style="${T.compact};color:var(--mid);">= Incremental revenue</span>
          <span></span>
          <span style="${T.compact};font-weight:600;color:var(--gray);text-align:right;">${escHtml(roi.incremental_revenue_est||'')}</span>
          <span style="${T.compact};color:var(--mid);">× Gross margin</span>
          <span style="${T.compact};color:var(--mid);">${roi.gross_margin_source ? `· ${escHtml(roi.gross_margin_source)}` : ''}</span>
          <span style="${T.compact};font-weight:600;color:var(--gray);text-align:right;">${roi.gross_margin_pct||''}%</span>
        </div>
        <div style="border-top:2px solid var(--border);margin-top:10px;padding-top:10px;display:flex;justify-content:space-between;align-items:center;">
          <span style="${T.title};color:var(--gray);">= Gross profit impact</span>
          <span style="font-size:20px;font-weight:700;color:var(--blue);">${escHtml(roi.gross_profit_impact_est)}</span>
        </div>
      </div>
    </div>` : '';

  const latNm = nmVals[nYrs-1], firstNm = nmVals[0];
  const latEm = emVals[nYrs-1], firstEm = emVals[0];
  const angleText = roi.gross_profit_impact_est
    ? `Revenue down 10%, EBITDA margin compressed from ${firstEm!==null?firstEm+'%':''} → ${latEm!==null?latEm+'%':''} over 4 years. CEO says "investing in technology platforms." At ${roi.gross_margin_pct||''}% gross margin, a ${roi.lift_pct||1}% revenue lift from better search = <strong>${escHtml(roi.gross_profit_impact_est)}</strong> gross profit.`
    : (f.algolia_angle || '');

  const algoliaAngleHtml = angleText ? `
    <div class="algolia-angle-box" style="margin-top:20px;">
      ${algoliaAngleBadge()}
      <p style="${T.compact};margin:0;">${angleText}</p>
      ${roiAccordion}
    </div>` : '';

  return `<section id="section-financials" class="audit-section">
    <div class="section-eyebrow">Company Intelligence · Financials ${srcTag('yf','Yahoo Finance')} ${srcTag('sec','SEC')}</div>
    <div class="section-title">Financial Profile</div>
    <p class="section-desc">4-year trajectory · Revenue, Gross Profit, EBITDA bars + EBITDA Margin % trend · Data as of ${s(D.meta?.data_vintage?.yahoo_finance || f.data_vintage)}</p>

    <!-- B: Composite SVG chart -->
    <div class="card-3d" style="padding:20px 16px 12px;margin-bottom:16px;">
      ${svgChart}
      ${legendHtml}
    </div>

    <!-- C: Metric table with sparklines -->
    ${tableHtml}

    <!-- Exec quote bridge -->
    ${quotesHtml ? `<div style="margin-bottom:20px;">${quotesHtml}</div>` : ''}

    <!-- Algolia Angle + ROI accordion -->
    ${algoliaAngleHtml}

    <div style="margin-top:10px;">
      <span class="tl-confidence">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="6.5" cy="6.5" r="6" stroke="var(--chart-other)" stroke-width="1"/><path d="M6.5 5.5v4M6.5 4.5v.5" stroke="var(--chart-other)" stroke-width="1.2" stroke-linecap="round"/></svg>
        Revenue, Gross Profit, EBITDA, Op. Income, Net Income: Yahoo Finance MCP (income_stmt) · 2026-04-14.
        Margins calculated from sourced figures.
        ${f.source_url ? lnk(f.source_url,'Yahoo Finance','') : ''}
      </span>
    </div>
  </section>`;

}

/* ═══════════════════════════════════════════════════

   SECTION: SCORE HEATMAP

═══════════════════════════════════════════════════ */

function sectionScoreHeatmap(D) {

  const sc = D.score || {};

  if (!sc.overall && !Object.keys(sc.breakdown||{}).length) return '';

  // Build category→finding map for TOC click targets

  const findings = D.findings || [];

  const catToFinding = {};

  findings.forEach(f => {

    if (!catToFinding[f.category]) catToFinding[f.category] = f;

  });



  // Map score breakdown key → finding (via breakdown_labels → category)

  const labels = sc.breakdown_labels || {};

  const sevs   = sc.breakdown_severity || {};

  const breakdown = sc.breakdown || {};



  const jumpToFinding = (findingId) =>

    `document.querySelector('[data-tab=\\'audit\\']').click();setTimeout(()=>document.getElementById('chapter-${findingId.toLowerCase()}')?.scrollIntoView({behavior:'smooth',block:'start'}),180);`;



  const rowColor = (v) => v <= 4 ? 'red' : v <= 6 ? 'amber' : 'green';



  // Sort entries: critical first, then moderate, then low

  const sortedEntries = Object.entries(breakdown).sort((a, b) => {

    const sa = sevs[a[0]] || 'LOW', sb = sevs[b[0]] || 'LOW';

    const order = { HIGH:0, MEDIUM:1, LOW:2 };

    if (order[sa] !== order[sb]) return order[sa] - order[sb];

    return a[1] - b[1];

  });



  // Build rows with dividers between severity groups

  // Gaps (HIGH/MEDIUM) get G01, G02… Strengths (LOW positive) get S01, S02…

  let lastSev = null;

  let gCount = 0, sCount = 0;

  const rows = sortedEntries.map(([key, val]) => {

    const label   = labels[key] || key.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());

    const sev     = sevs[key] || 'LOW';

    const finding = catToFinding[label];

    const col     = rowColor(val);

    const hasLink = !!finding;

    // Positive findings are strengths (S), others are gaps (G)

    const isPositive = finding?.severity === 'positive' || (!finding && sev === 'LOW' && val >= 7);

    const num = isPositive

      ? `S${String(++sCount).padStart(2,'0')}`

      : `G${String(++gCount).padStart(2,'0')}`;



    let divider = '';

    if (sev !== lastSev) {

      const sevLabel = sev === 'HIGH' ? '🔴 Critical — needs immediate attention'

                     : sev === 'MEDIUM' ? '🟡 Moderate — improvement opportunities'

                     : '🟢 Strengths — working well';

      const divBg = sev === 'HIGH' ? 'rgba(220,38,38,0.08)' : sev === 'MEDIUM' ? 'rgba(217,119,6,0.08)' : 'rgba(5,150,105,0.08)';

      const divBorder = sev === 'HIGH' ? 'rgba(220,38,38,0.18)' : sev === 'MEDIUM' ? 'rgba(217,119,6,0.18)' : 'rgba(5,150,105,0.18)';

      divider = `<div class="toc-row toc-row--divider" style="background:${divBg};border-bottom:1px solid ${divBorder};"><span class="toc-divider-label">${sevLabel}</span></div>`;

      lastSev = sev;

    }



    const row = `<div class="toc-row ${hasLink ? '' : 'toc-row--no-finding'}"

      data-toc-key="${key}"

      ${hasLink ? `onclick="${jumpToFinding(finding.id)}" role="button" tabindex="0"` : ''}>

      <span class="toc-num">${num}</span>

      <span class="toc-area">${escHtml(label)}</span>

      <div class="toc-bar-track">

        <div class="toc-bar-fill toc-bar-fill--${col}" style="width:${val*10}%"></div>

      </div>

      <span class="toc-score toc-score--${col}">${val}/10</span>

      <span class="toc-sev toc-sev--${col}">${sev}</span>

      <span class="toc-arrow">${hasLink ? '→' : '✓'}</span>

    </div>`;



    return divider + row;

  });



  return `<section id="score-heatmap" class="audit-section">

    <div class="section-eyebrow">Search Audit · Table of Contents</div>

    <div class="section-title">10 Areas Evaluated</div>

    <p class="section-desc">Overall score: <strong>${s(sc.overall)}/10</strong> — ${escHtml(sc.verdict)} · Click any row to jump to that chapter.</p>

    <div class="toc-list">${rows.join('')}</div>

    <div class="grid-3" style="margin-bottom:8px;">

      ${[

        { label: 'Critical Gaps',  value: n(sc.critical_count),  color: 'var(--red)' },

        { label: 'Moderate Gaps',  value: n(sc.moderate_count),  color: 'var(--amber)' },

        { label: 'Overall Score',  value: s(sc.overall) + '/10', color: 'var(--blue)' },

      ].map(m => `<div class="card" style="text-align:center;">

        <div style="${T.h3};color:${m.color};">${m.value}</div>

        <div style="${T.bodySmMid14};text-transform:uppercase;letter-spacing:0.06em;margin-top:4px;">${m.label}</div>

      </div>`).join('')}

    </div>

  </section>`;

}

/* ═══════════════════════════════════════════════════

   SECTION: INTELLIGENCE SIGNALS (all types, filterable)

function sectionSignals(D) {

  // Exclude 'hiring' type — hiring data lives in its own dedicated section (sectionHiring)

  // to avoid duplication. Hiring signals here would repeat the buying committee section.

  const signals = (D.intelligence_signals || []).filter(s => s.type !== 'hiring' && s.type !== 'hiring_signal' && (s.badge_label || s.title || s.text || s.body || s.quote || s.signal));

  if (!signals.length) return `<section id="section-signals" class="audit-section">

    <div class="section-eyebrow">Company Intelligence · Live Signals</div>

    <div class="section-title">Sales Signals</div>

    <p class="section-desc">No signals collected. Run /algolia-live-signals to populate hiring, social, and news signals.</p>

  </section>`;



  // Tier signals by urgency — ordering matters for visual impact

  const URGENCY_TIER = {
    // Tier 1 — act immediately
    'hiring':'1','hiring_signal':'1','news-leadership':'1','news-funding':'1',
    // Tier 2 — high urgency
    'exec':'2','earnings_quote':'2','competitor':'2','news_signal':'2',
    'news-tech':'2','sec_risk':'2','social-li':'2','social-x':'2','social_signal':'2',
    // Tier 3 — medium
    'media':'3','media_quote':'3','industry-risk':'3','news-launch':'3','news-international':'3',
    // Tier 4 — positive
    'industry-opp':'4','customer':'4','partner':'4',
  };

  const PLATFORM_ICON = {

    'social-li': `<svg width="14" height="14" viewBox="0 0 24 24" fill="var(--linkedin)"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>`,

    'social-x':  `<svg width="14" height="14" viewBox="0 0 24 24" fill="#000"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.735-8.835L1.254 2.25H8.08l4.259 5.626 5.905-5.626zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>`,

  };



  const sorted = [...signals].sort((a,b) => {

    const ta = URGENCY_TIER[a.type] || '5';

    const tb = URGENCY_TIER[b.type] || '5';

    return ta.localeCompare(tb);

  });



  // Group into tiers for visual hierarchy

  const tier1 = sorted.filter(s => URGENCY_TIER[s.type] === '1');

  const tier2 = sorted.filter(s => URGENCY_TIER[s.type] === '2');

  const tier3plus = sorted.filter(s => !['1','2'].includes(URGENCY_TIER[s.type]||'5'));



  // ── AE Action defaults by type ─────────────────────────────────────────────
  const deriveAeAction = (s) => {
    if (s.ae_action) return s.ae_action;
    const t = s.type || '';
    const titleStr = s.title || s.badge_label || '';
    if (t === 'hiring_signal' || t === 'hiring') return `Identify ${escHtml(titleStr.slice(0,60)||'this hire')} before they inherit status quo tools`;
    if (t === 'news_signal' && /partner|partnership/i.test(titleStr + (s.body||''))) {
      const partnerMatch = (titleStr + (s.body||'')).match(/(?:partner(?:ship)?|collab(?:oration)?) (?:with )?([A-Z][A-Za-z]+(?:\s[A-Z][A-Za-z]+)?)/);
      return partnerMatch ? `Contact Algolia Partner Manager for ${escHtml(partnerMatch[1])} this week for warm intro` : 'Use as outreach hook this week — partnership creates warm path';
    }
    if (t === 'news_signal' && /CFO|CTO|CMO|CEO|leadership|transition/i.test(titleStr)) return 'Reach out before next quarter planning locks — leadership window is open now';
    if (t === 'earnings_quote' || t === 'media_quote') {
      const q = s.quote || s.body || s.signal || '';
      const snippet = q.split(/\s+/).slice(0,8).join(' ');
      return snippet ? `Open discovery call with: "${escHtml(snippet)}…" — use to surface search gap` : 'Lead with this quote in discovery call to surface search gap';
    }
    if (t === 'news_signal') return 'Use as outreach hook this week — timely context for first contact';
    if (t === 'competitor') return 'Reference in competitive pitch — direct displacement opportunity';
    if (t === 'sec_risk' || t === 'industry-risk') return 'Use in business case — validate risk with prospect in discovery';
    return 'Use as outreach hook — timely context for first contact';
  };

  // ── Table row renderer ─────────────────────────────────────────────────────
  const signalTableRow = (sig) => {
    const sigTitle = sig.badge_label || sig.title || (sig.signal||'').slice(0,80) || sig.text?.slice(0,80) || '—';
    const algAngle = sig.relevance || sig.algolia_angle || sig.context || sig.description || '';
    const aeAction = deriveAeAction(sig);
    const srcStr   = typeof sig.source === 'string' ? sig.source : '';
    const resolvedUrl = sig.source_url || srcStr.match(/https?:\/\/[^\s]+/)?.[0] || '';
    const hasUrl = resolvedUrl.startsWith('http');
    const dateStr = sig.source_date || sig.date || '';

    return `<tr style="border-bottom:1px solid var(--border);vertical-align:top;">
      <td style="padding:10px 12px 10px 0;width:30%;">
        <div style="${T.title};line-height:1.4;margin-bottom:2px;">${escHtml(sigTitle.slice(0,100))}</div>
        ${dateStr ? `<div style="${T.compact};">${escHtml(dateStr.slice(0,10))}</div>` : ''}
      </td>
      <td style="padding:10px 12px;width:35%;${T.bodySm};color:var(--gray);line-height:1.5;">
        ${escHtml(algAngle.slice(0,180))}
      </td>
      <td style="padding:10px 12px;width:25%;${T.bodySm};color:var(--gray);line-height:1.5;">
        ${escHtml(aeAction.slice(0,160))}
      </td>
      <td style="padding:10px 0 10px 12px;width:10%;text-align:center;">
        ${hasUrl
          ? `<a href="${resolvedUrl}" target="_blank"
              style="${T.labelBlue};text-decoration:none;white-space:nowrap;"
              onmouseenter="this.style.textDecoration='underline'"
              onmouseleave="this.style.textDecoration='none'">→ Source</a>`
          : '<span style="${T.compact};">—</span>'}
      </td>
    </tr>`;
  };

  // ── Group table renderer ───────────────────────────────────────────────────
  const renderGroupTable = (emoji, label, items, headerBg, headerColor) => {
    if (!items.length) return '';
    return `
    <div style="margin-bottom:28px;">
      <div style="background:${headerBg};border-radius:8px 8px 0 0;padding:9px 14px;display:flex;align-items:center;gap:8px;">
        <span style="${T.bodySm};">${emoji}</span>
        <span style="${T.eyebrowBlue};color:${headerColor};">${label} (${items.length})</span>
      </div>
      <table style="width:100%;border-collapse:collapse;border:1px solid var(--border);border-top:none;border-radius:0 0 8px 8px;overflow:hidden;">
        <thead>
          <tr style="background:rgba(0,0,0,0.02);">
            <th style="padding:8px 12px 8px 0;text-align:left;${T.eyebrowBlue};width:30%;border-bottom:1px solid var(--border);">SIGNAL</th>
            <th style="padding:8px 12px;text-align:left;${T.eyebrowBlue};width:35%;border-bottom:1px solid var(--border);">ALGOLIA ANGLE</th>
            <th style="padding:8px 12px;text-align:left;${T.eyebrowBlue};width:25%;border-bottom:1px solid var(--border);">AE ACTION</th>
            <th style="padding:8px 0 8px 12px;text-align:center;${T.eyebrowBlue};width:10%;border-bottom:1px solid var(--border);">SOURCE</th>
          </tr>
        </thead>
        <tbody>
          ${items.map(signalTableRow).join('')}
        </tbody>
      </table>
    </div>`;
  };

  return `<section id="section-signals" class="audit-section">

    <div class="section-eyebrow">Company Intelligence · Live Signals</div>

    <div class="section-title">Sales Signals</div>

    <p class="section-desc">${signals.length} signals · Sourced from LinkedIn Jobs, LinkedIn Posts, Twitter/X, Google News, and manual research. Every signal links to its source.</p>

    ${renderGroupTable('🔴', 'ACT NOW', tier1, 'rgba(220,38,38,0.08)', 'var(--red)')}

    ${renderGroupTable('🟡', 'THIS QUARTER', tier2, 'rgba(217,119,6,0.08)', 'var(--amber)')}

    ${renderGroupTable('🟢', 'MONITOR', tier3plus, 'rgba(5,150,105,0.08)', 'var(--mid)')}

  </section>`;

}

function sectionExecQuotes(D) {

  // Prefer intelligence_signals[] (v1.1 schema) — filter to quote types only.
  // Fall back to legacy D.executives[] for backward compatibility with pre-v1.1 audits.
  const sigQuotes = (D.intelligence_signals || []).filter(
    s => (s.type === 'earnings_quote' || s.type === 'media_quote') && (s.quote || s.signal) && (s.quote || s.signal).trim()
  );

  const useLegacy = sigQuotes.length === 0;

  // ── Render: intelligence_signals schema (v1.1) ────────────────────────────
  const renderSignalQuote = (q) => {
    const badgeHtml = q.type === 'media_quote'
      ? srcTag('bay', 'MEDIA' + (q.publication ? ' \xB7 ' + escHtml(q.publication) : ''))
      : srcTag('sec', 'EARNINGS CALL');

    // Resolve source URL from source_url or extract from string source field (old schema)
    const srcStr = typeof q.source === 'string' ? q.source : '';
    const resolvedSrcUrl = q.source_url || srcStr.match(/https?:\/\/[^\s]+/)?.[0] || '';
    const sourceLink = resolvedSrcUrl
      ? lnk(resolvedSrcUrl, escHtml(q.label || q.source_date || srcStr.slice(0,30) || 'Source'))
      : escHtml(q.label || q.source_date || srcStr.slice(0,40) || '');

    // Normalize quote text and attribution across old schema (signal) and new schema (quote/speaker/title)
    const quoteText = q.quote || q.signal || '';
    const speaker   = q.speaker || '';
    const attrTitle = q.title  || '';
    const context   = q.context || q.algolia_angle || '';

    return `
    <div class="quote-card">

      <div class="quote-mark">"</div>

      <div class="quote-text">${escHtml(quoteText)}</div>

      ${(speaker || attrTitle) ? `<div class="quote-attr" style="${T.labelBlue}">— ${escHtml([speaker, attrTitle].filter(Boolean).join(', '))}</div>` : ''}

      <div class="quote-source">

        ${badgeHtml} ${sourceLink}

      </div>

      ${context ? `<div class="quote-relevance" style="${T.bodySm}">${escHtml(context)}</div>` : ''}

    </div>`;
  };

  // ── Render: legacy executives[] schema (pre-v1.1 backward compat) ─────────
  const renderLegacyQuote = (q) => `
    <div class="quote-card">

      <div class="quote-mark">"</div>

      <div class="quote-text">${escHtml(q.quote)}</div>

      <div class="quote-attr">— ${escHtml(q.name)}, ${escHtml(q.title)}</div>

      <div class="quote-source">

        ${lnk(q.quote_source, escHtml(q.quote_source_label || 'Source'))}${!q.quote_source_label && q.quote_date ? ' · ' + escHtml(fmtDate(q.quote_date)) : ''}

      </div>

      ${q.relevance ? `<div class="quote-relevance">${escHtml(q.relevance)}</div>` : ''}

    </div>`;

  const renderedQuotes = useLegacy
    ? (D.executives || []).map(renderLegacyQuote).join('')
    : sigQuotes.map(renderSignalQuote).join('');

  return `<section id="section-quotes" class="audit-section">

    <div class="section-eyebrow">Intelligence · In Their Own Words</div>

    <div class="section-title">What Leadership Is Saying</div>

    <p class="section-desc">Direct quotes from named executives, sourced from earnings calls, investor presentations, press interviews, and SEC filings.</p>

    ${renderedQuotes || '<p style="' + T.body + '">No executive quotes available.</p>'}

  </section>`;

}

function renderBerkshire(f) {

  const note = f.berkshire_note || '';

  const numbered = note.match(/\(\d+\)\s[^(]+/g);

  let bodyHtml;

  if (numbered && numbered.length > 1) {

    const intro = note.split('(1)')[0].trim();

    const introHtml = intro ? `<p style="${T.bodySm};margin-bottom:8px;">${escHtml(intro)}</p>` : '';

    const items = numbered.map(item => {

      const text = item.replace(/^\(\d+\)\s/, '').replace(/;$/, '').trim();

      return `<li style="${T.bodySm};margin-bottom:4px;">${escHtml(text)}</li>`;

    }).join('');

    bodyHtml = introHtml + `<ol style="margin:0;padding-left:20px;">${items}</ol>`;

  } else {

    bodyHtml = `<p style="${T.bodySm};">${escHtml(note)}</p>`;

  }

  const sourceHtml = f.berkshire_source

    ? `<a href="${f.berkshire_source}" target="_blank" style="${T.labelBlue};">Source ↗</a>`

    : `<span style="${T.bodySmGray12};font-style:italic;">Source: internal analysis</span>`;

  return `<div class="card" style="background:linear-gradient(135deg,var(--violet-tint),var(--violet-light));padding:20px 24px;border:none;">

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">

      <div style="${T.eyebrowMd};color:var(--purple);">${escHtml(f.berkshire_label||'Investor Context')}</div>

      ${sourceHtml}

    </div>

    ${bodyHtml}

  </div>`;

}

function sectionBusinessCaseHook(D) {

/* ── CountUp helper — Intersection Observer, 1.6s, respects prefers-reduced-motion ── */
function initCaseStudyCountUp() {
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (!entry.isIntersecting || entry.target._counted) return;
      entry.target._counted = true;
      const raw = entry.target.dataset.metric || '';
      const match = raw.match(/^([^\d\-]*)?([\d,.]+)([^\d]*)$/);
      if (!match) return;
      const prefix = match[1] || '';
      const end = parseFloat(match[2].replace(/,/g, ''));
      const suffix = match[3] || '';
      const decimals = (match[2].split('.')[1] || '').length;
      const start = Date.now();
      const dur = 1600;
      function tick() {
        const p = Math.min((Date.now() - start) / dur, 1);
        const val = end * p;
        entry.target.textContent = prefix + val.toLocaleString(undefined, {minimumFractionDigits: decimals, maximumFractionDigits: decimals}) + suffix;
        if (p < 1) requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    });
  }, { threshold: 0.15 });
  document.querySelectorAll('[data-metric]').forEach(el => observer.observe(el));
}

    return [];

  }

    if (Array.isArray(a.proof_points) && a.proof_points.length) return a.proof_points;

    if (a.algolia_proof) return [{ text: a.algolia_proof, source: 'Algolia', url: null }];

  /* ── generic objections (non-angle) ── */

  const commonObjHTML = genericObjs.length ? `<div style="margin-top:28px;">

    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;">

  return `<style>

    .plays-accordion { display:flex; gap:10px; min-height:420px; align-items:stretch; }

    .play-panel {

      flex:0 0 68px; border-radius:12px; border:1.5px solid var(--border);

    .play-q-num { width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; flex-shrink:0; margin-top:2px; font-size:14px; }
    .play-num-lg { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; color:white; flex-shrink:0; font-size:14px; }

    .play-panel.active .play-expanded { display:flex; }

    .play-exp-header { display:grid; grid-template-columns:1fr 1fr; gap:20px; padding:20px 24px 16px; border-bottom:1px solid var(--border); flex-shrink:0; }

function sectionBuyingCommittee(D) {

  const hir = D.hiring || {};

  const committee = Array.isArray(hir.buying_committee) ? hir.buying_committee : [];

  const phases = hir.engagement_phases || [];

  if (!committee.length) return '';

  const sigCol = {hot:'var(--red)', warm:'var(--amber)', cold:'var(--mid)'};

  const bcId = 'bc-' + Math.random().toString(36).slice(2,7);

  const corners = plusCorner('tl') + plusCorner('tr') + plusCorner('bl') + plusCorner('br');

  // Bento span: HOT first card gets wider treatment, rest are standard
  let hotCount = 0;

  return `<section id="section-buying-committee" class="audit-section">

    <div class="section-eyebrow">Sales Play · Deal Strategy</div>

    <div class="section-title">Buying Committee &amp; Engagement Plan</div>

        transition:border-color 0.25s, box-shadow 0.25s;

      .bc-card:hover {
        border-color:var(--blue);
        box-shadow:0 4px 24px rgba(0,61,255,0.08);
      }
      .bc-card:hover .bc-corner { color:var(--blue); }
      .bc-corner {

        background:#f8fafc; border-radius:2px;

      .bc-corner-tl { top:-10px; left:-10px; }
      .bc-corner-tr { top:-10px; right:-10px; }
      .bc-corner-bl { bottom:-10px; left:-10px; }
      .bc-corner-br { bottom:-10px; right:-10px; }
      .bc-role { font-size:10px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; margin-bottom:14px; }
      .bc-avatar-row { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
      .bc-avatar { width:48px; height:48px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:700; flex-shrink:0; position:relative; }
      .bc-li-badge {
        position:absolute; bottom:-3px; right:-3px; width:18px; height:18px;
        border-radius:4px; background:#0A66C2; display:flex; align-items:center;

      }

      .bc-title-text { font-size:12px; color:#64748b; margin-top:2px; }
      .bc-sig { display:inline-block; font-size:10px; font-weight:700; letter-spacing:0.07em; padding:2px 8px; border-radius:3px; margin-left:6px; vertical-align:middle; }
      .bc-tactic-label { font-size:10px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:#94a3b8; margin-bottom:4px; margin-top:12px; }
      .bc-tactic-text { font-size:13px; color:#475569; line-height:1.6; }
      .bc-open-link { font-size:12px; font-weight:600; color:var(--blue); text-decoration:none; margin-top:10px; display:inline-block; }
      .bc-open-link:hover { color:var(--purple); }
      .bc-divider { width:100%; height:1px; background:#f1f5f9; margin:12px 0; }
    </style>

    <div class="bc-grid" id="${bcId}">

      ${committee.map((r,idx)=>{
        const c = sigCol[r.signal]||sigCol.warm;

        const liUrl = r.linkedin_url || (!isOpen ? `https://www.linkedin.com/search/results/people/?keywords=${encodeURIComponent(r.name)}` : null);
        const initials = isOpen ? '?' : (r.name||'').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
        const liSvg = `<svg width="10" height="10" viewBox="0 0 24 24" fill="white"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>`;

        const rawC = SIGNAL_COLORS_RAW[c] || '#6B7280';
        // Bento span: first HOT is wide (4 cols), second HOT normal (2), all others 2
        let span = 2;
        if (r.signal === 'hot') { span = hotCount === 0 ? 4 : 2; hotCount++; }
        return `<div class="bc-card" data-idx="${idx}" style="grid-column:span ${span};">
          ${corners}
          <div class="bc-role" style="color:${rawC};">${escHtml(r.role)}</div>
          <div class="bc-avatar-row">
            <div class="bc-avatar" style="background:${rawC}15;border:2px solid ${rawC}40;color:${rawC};">

              ${liUrl?`<a href="${liUrl}" target="_blank" class="bc-li-badge" title="Find on LinkedIn">${liSvg}</a>`:''}
            </div>
            <div>
              <div style="display:flex;align-items:center;flex-wrap:wrap;">
                ${liUrl
                  ? `<a href="${liUrl}" target="_blank" class="bc-name" style="text-decoration:none;color:var(--gray);">${escHtml(r.name||'Open Role')}</a>`
                  : `<span class="bc-name">${escHtml(r.name||'Open Role')}</span>`

              </div>
              ${r.title?`<div class="bc-title-text">${escHtml(r.title)}</div>`:''}
            </div>
          </div>
          ${r.message?`<div class="bc-divider"></div><div class="bc-tactic-label">Engagement Tactic</div><div class="bc-tactic-text">${escHtml(r.message)}</div>`:''}
          ${isOpen && r.job_url?`<a href="${r.job_url}" target="_blank" class="bc-open-link">View open role →</a>`:''}
        </div>`;
      }).join('')}

    </div>


    ${phases.length?`<div style="${T.eyebrow};margin-bottom:14px;">3-Phase Engagement Strategy</div>

    <div style="display:flex;flex-direction:column;gap:12px;">

      ${phases.map((p,i)=>`<div class="card" style="display:flex;gap:16px;align-items:flex-start;padding:18px 20px;">

        <div style="width:36px;height:36px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;${T.title};color:white;flex-shrink:0;">P${p.phase||i+1}</div>

        <div style="flex:1;">

          <div style="${T.title};margin-bottom:4px;">${escHtml(p.label||'')}</div>

          <div style="${T.labelMid};margin-bottom:4px;">Target: ${escHtml(p.target||'')}</div>

          <div style="${T.body};line-height:1.5;">${escHtml(p.message||'')}</div>

          <div style="${T.bodySmMid14};margin-top:4px;font-style:italic;">${escHtml(p.timing||'')}</div>

        </div>

      </div>`).join('')}

    </div>`:''}

  </section>`;

}

function sectionStatBar(D) {
  const sc = D.score || {};
  const fin = D.financials || {};
  const ga = D.golden_angle || {};
  const signals = D.intelligence_signals || [];
  const criticals = (D.findings || []).filter(f => f.severity === 'critical');

  const navTo = (tab, anchor) =>
    `document.querySelector('[data-tab=\\'${tab}\\']').click();${anchor
      ? `setTimeout(()=>document.getElementById('${anchor}')?.scrollIntoView({behavior:'smooth',block:'start'}),180)`
      : `window.scrollTo({top:0,behavior:'instant'})`}`;

  // Stat 1: Score
  const score = sc.overall != null ? `${sc.overall}/10` : '—/10';
  const critCount = sc.critical_count || criticals.length || 0;
  const scoreDesc = critCount > 0
    ? `${critCount} critical gap${critCount !== 1 ? 's' : ''} identified`
    : (sc.verdict || 'Search experience audit');

  // Stat 2: Revenue at risk
  const roi = fin.roi_scenarios?.conservative?.annual_impact || fin.search_roi_est || null;
  const roiVal = roi ? escHtml(roi) : '—';

  // Stat 3: Competitive signal
  const compUsing = (ga.competitors_using_algolia || [])[0];
  const compVal = compUsing ? escHtml(compUsing.name) : (ga.talk_track ? 'See analysis' : '—');
  const compDesc = compUsing ? 'Direct competitor uses Algolia' : (ga.talk_track ? 'Competitive advantage' : 'No confirmed golden angle');

  // Stat 4: Top timing signal
  const topSig = signals.find(s => ['exec','funding','competitor'].includes(s.type));
  const sigVal = topSig ? escHtml(topSig.badge_label) : '—';
  const sigDesc = topSig
    ? escHtml((topSig.text || '').slice(0, 60)) + ((topSig.text || '').length > 60 ? '…' : '')
    : 'No urgent signals detected';

  return `<div class="floating-card-wrap" id="fc-wrap"><div class="floating-card-inner" id="fc-inner"><div id="stat-bar" class="stat-bar">
    <div class="stat-bar__item" onclick="${navTo('audit', 'section-heatmap')}">
      <div class="stat-bar__label">Search Score</div>
      <div class="stat-bar__value">${score}</div>
      <div class="stat-bar__sub">${escHtml(scoreDesc)}</div>
      <span class="stat-bar__arrow">→</span>
    </div>
    <div class="stat-bar__item" onclick="${navTo('case', 'section-roi')}">
      <div class="stat-bar__label">Business Case ROI</div>
      <div class="stat-bar__value">${roiVal}</div>
      <div class="stat-bar__sub">Calculate potential impact</div>
      <span class="stat-bar__arrow">→</span>
    </div>
    <div class="stat-bar__item" onclick="${navTo('case', 'section-competitive')}">
      <div class="stat-bar__label">Competitive Signal</div>
      <div class="stat-bar__value">${compVal}</div>
      <div class="stat-bar__sub">${compDesc}</div>
      <span class="stat-bar__arrow">→</span>
    </div>
    <div class="stat-bar__item" onclick="${navTo('case', 'section-why-now')}">
      <div class="stat-bar__label">Timing Signal</div>
      <div class="stat-bar__value">${sigVal}</div>
      <div class="stat-bar__sub">${sigDesc}</div>
      <span class="stat-bar__arrow">→</span>
    </div>
  </div></div></div>`;
}

function renderSections(D) {

  // Normalize finding severity to canonical lowercase form — handles HIGH/high/MEDIUM/medium etc.
  (D.findings || []).forEach(f => {
    const l = (f.severity || '').toLowerCase();
    if (l === 'high') f.severity = 'critical';
    else if (l === 'medium') f.severity = 'moderate';
    else if (l === 'low') f.severity = 'positive';

function initTabRail() {

  const tabBtns = document.querySelectorAll('#tab-rail .tab-btn');

  const groups  = document.querySelectorAll('.section-group[data-tab]');



  function showTab(tabId) {

    tabBtns.forEach(b => b.classList.toggle('active', b.dataset.tab === tabId));

    groups.forEach(g => {

      g.classList.toggle('tab-active', g.dataset.tab === tabId);

    });

    window.scrollTo({ top: 0, behavior: 'instant' });

    sessionStorage.setItem('spa-tab', tabId);

    // Update tab subtitle
    const subtitleEl = document.getElementById('tab-subtitle-display');
    if (subtitleEl) {
      const activeBtn = document.querySelector(`.tab-btn[data-tab="${tabId}"]`);
      const personalized = (window.AUDIT_DATA && window.AUDIT_DATA.tab_subtitles && window.AUDIT_DATA.tab_subtitles[tabId]) || null;
      const fallback = (activeBtn && activeBtn.dataset.subtitle) || '';
      subtitleEl.textContent = personalized || fallback;
    }

  }



  tabBtns.forEach(b => b.addEventListener('click', () => showTab(b.dataset.tab)));

  // Expose globally so bento tile nav links can call window.showTab('tabId') directly
  window.showTab = showTab;



  // Restore tab from session (useful on page reload)

  const saved = sessionStorage.getItem('spa-tab');

  if (saved && document.querySelector(`[data-tab="${saved}"]`)) showTab(saved);

  // Initialize tab subtitle on first load
  const initialBtn = document.querySelector('.tab-btn.active');
  const subtitleEl = document.getElementById('tab-subtitle-display');
  if (subtitleEl && initialBtn) {
    const personalized = (window.AUDIT_DATA && window.AUDIT_DATA.tab_subtitles && window.AUDIT_DATA.tab_subtitles[initialBtn.dataset.tab]) || null;
    subtitleEl.textContent = personalized || initialBtn.dataset.subtitle || '';
  }

}

function initSectionStrips() {
  // Create sidebar as fixed overlay — appended to body, not layout
  const sidebar = document.createElement('div');
  sidebar.id = 'section-sidebar';
  document.body.appendChild(sidebar);

  // Build a panel for each tab
  function buildPanel(tabId) {
    const config = SECTION_STRIP_CONFIG[tabId] || [];
    const panel = document.createElement('div');
    panel.className = 'section-sidebar__panel';
    panel.id = `sidebar-panel-${tabId}`;
    panel.style.display = 'none';

    const inner = document.createElement('div');
    inner.className = 'section-sidebar__inner';

    // Heading — active tab label
    const tabLabel = document.querySelector(`.tab-btn[data-tab="${tabId}"]`)?.textContent?.trim() || tabId;
    const heading = document.createElement('div');
    heading.className = 'section-sidebar__heading';
    heading.textContent = tabLabel;
    inner.appendChild(heading);

    // Only show items whose section actually rendered in the DOM
    const renderedItems = config.filter(item => !!document.getElementById(item.id));
    renderedItems.forEach((item, i) => {
      const el = document.createElement('div');
      el.className = 'section-sidebar__item' + (i === 0 ? ' section-sidebar__item--active' : '');
      el.dataset.targetId = item.id;
      el.innerHTML = `
        <div class="section-sidebar__num">${i + 1}</div>
        <div>
          <div class="section-sidebar__title">${escHtml(item.label)}</div>
          ${item.desc ? `<div class="section-sidebar__desc">${escHtml(item.desc)}</div>` : ''}
        </div>`;
      el.addEventListener('click', () => {
        const target = document.getElementById(item.id);
        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
      inner.appendChild(el);
    });
    // Hide panel entirely if no items rendered
    if (!renderedItems.length) panel.style.display = 'none';

    panel.appendChild(inner);
    return panel;
  }

  Object.keys(SECTION_STRIP_CONFIG).forEach(tabId => {
    sidebar.appendChild(buildPanel(tabId));
  });

  // Show the panel that matches the active tab
  function showPanel(activeTabId) {
    const sidebar = document.getElementById('section-sidebar');
    if (activeTabId === 'overview') {
      if (sidebar) sidebar.style.display = 'none';
      return;
    }
    if (sidebar) sidebar.style.display = '';
    document.querySelectorAll('.section-sidebar__panel').forEach(p => {
      p.style.display = p.id === `sidebar-panel-${activeTabId}` ? 'block' : 'none';
    });
  }

  const initialTab = document.querySelector('.tab-btn.active');
  if (initialTab) showPanel(initialTab.dataset.tab);
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => showPanel(btn.dataset.tab));
  });

  // Scroll-spy
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      const sectionId = entry.target.id;
      document.querySelectorAll('.section-sidebar__item').forEach(item => {
        const panel = item.closest('.section-sidebar__panel');
        if (!panel || panel.style.display === 'none') return;
        if (item.dataset.targetId === sectionId) {
          panel.querySelectorAll('.section-sidebar__item').forEach(i => i.classList.remove('section-sidebar__item--active'));
          item.classList.add('section-sidebar__item--active');
        }
      });
    });
  }, { threshold: 0.2, rootMargin: '-5% 0px -65% 0px' });

  Object.values(SECTION_STRIP_CONFIG).flat().forEach(item => {
    const el = document.getElementById(item.id);
    if (el) observer.observe(el);
  });
}

  function fuzzy(query, text) {

    const q = query.toLowerCase(); const t = text.toLowerCase();

    if (t.includes(q)) return true;

    let qi = 0;

    for (let i = 0; i < t.length && qi < q.length; i++) {

      if (t[i] === q[qi]) qi++;

    }

    return qi === q.length;

  }



  let activeIdx = -1;

  function renderResults(query) {

    activeIdx = -1;

    const items = query.trim()

      ? INDEX.filter(i => fuzzy(query, i.text) || fuzzy(query, i.hint))

  }



  function open() {

    overlay.classList.add('open');

    input.value = '';

    renderResults('');

    input.focus();

  }

  function close() {

    overlay.classList.remove('open');

    input.blur();

  }



  trigger?.addEventListener('click', open);

  overlay.addEventListener('click', e => { if (e.target === overlay) close(); });

  input.addEventListener('input', e => renderResults(e.target.value));

  input.addEventListener('keydown', e => {

    if (e.key === 'ArrowDown')  { e.preventDefault(); moveCursor(1); }

    if (e.key === 'ArrowUp')    { e.preventDefault(); moveCursor(-1); }

    if (e.key === 'Enter') {

      const active = results.querySelector('.cmdK-active');

      active?.click();

    }

    if (e.key === 'Escape') close();

  });

  document.addEventListener('keydown', e => {

    if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); open(); }

  });

}

function initSalesPlays() {

function initDragPill() {

  const pill = document.getElementById('tab-rail');

  if (!pill) return;



  let dragging = false, startX, startY, originLeft, originTop;



  // Show grab cursor on the pill background (not on buttons)

  pill.style.cursor = 'grab';



  pill.addEventListener('mousedown', e => {

    if (e.target.closest('.tab-btn') || e.target.closest('.tab-rail-cmdK')) return;

    dragging = true;

    const rect = pill.getBoundingClientRect();

    startX = e.clientX; startY = e.clientY;

    originLeft = rect.left; originTop = rect.top;

    pill.style.cursor = 'grabbing';

    pill.style.transition = 'none';

    pill.style.transform = 'none';

    pill.style.left = originLeft + 'px';

    pill.style.top  = originTop  + 'px';

    e.preventDefault();

  });



  document.addEventListener('mousemove', e => {

    if (!dragging) return;

    const nx = originLeft + (e.clientX - startX);

    const ny = originTop  + (e.clientY - startY);

    const pw = pill.offsetWidth, ph = pill.offsetHeight;

    pill.style.left = Math.max(8, Math.min(nx, window.innerWidth  - pw - 8)) + 'px';

    pill.style.top  = Math.max(8, Math.min(ny, window.innerHeight - ph - 8)) + 'px';

  });



  document.addEventListener('mouseup', () => {

    if (!dragging) return;

    dragging = false;

    pill.style.cursor = 'grab';

    pill.style.transition = '';

    sessionStorage.setItem('pill-xy', JSON.stringify({ l: pill.style.left, t: pill.style.top }));

  });



  // Restore position across tab switches

  const saved = sessionStorage.getItem('pill-xy');

  if (saved) {

    try {

      const { l, t } = JSON.parse(saved);

      pill.style.transform = 'none';

      pill.style.left = l; pill.style.top = t;

    } catch(e) {}

  }

}

function initFinTimeline() {

  const nodes  = Array.from(document.querySelectorAll('[data-tl-node]'));

  const fill   = document.getElementById('fin-fill');

  if (!nodes.length) return;



  // Stagger-reveal each node as it enters viewport

  const nodeObs = new IntersectionObserver(entries => {

    entries.forEach(entry => {

      if (entry.isIntersecting) {

        entry.target.classList.add('tl-node--visible');

        nodeObs.unobserve(entry.target);

      }

    });

  }, { threshold: 0.25 });

  nodes.forEach(n => nodeObs.observe(n));



  // Fill the vertical track as the section scrolls

  if (fill) {

    const trackEl = document.getElementById('fin-timeline');

    const scrollHandler = () => {

      if (!trackEl) return;

      const rect = trackEl.getBoundingClientRect();

      const winH = window.innerHeight;

      // pct = 0 when top of section at bottom of screen → 1 when bottom of section at top

      const pct = Math.min(1, Math.max(0, (winH - rect.top) / (winH + rect.height)));

      fill.style.height = (pct * 100) + '%';

    };

    window.addEventListener('scroll', scrollHandler, { passive: true });

    scrollHandler(); // run once on load

  }

}

/* ─── Chapter IntersectionObserver — highlights active TOC tile as you scroll ─── */

function initChapterObserver() {

  const chapters = document.querySelectorAll('.chapter-wrap[data-finding-id]');

  if (!chapters.length) return;



  // Build findingId → areaKey map from TOC tiles

  const findingToKey = {};

  document.querySelectorAll('.toc-tile[data-toc-key]').forEach(tile => {

    // Each tile's onclick contains the findingId — extract it

    const onclick = tile.getAttribute('onclick') || '';

    const m = onclick.match(/chapter-([a-z0-9]+)/i);

    if (m) findingToKey[m[1].toUpperCase()] = tile.dataset.tocKey;

  });



  const obs = new IntersectionObserver(entries => {

    entries.forEach(entry => {

      if (!entry.isIntersecting) return;

      const fid = entry.target.dataset.findingId;

      const key = findingToKey[fid];

      document.querySelectorAll('.toc-tile').forEach(t => t.classList.remove('active'));

      if (key) {

        const activeTile = document.querySelector(`.toc-tile[data-toc-key="${key}"]`);

        if (activeTile) activeTile.classList.add('active');

      }

    });

  }, { rootMargin: '-10% 0px -60% 0px' });



  chapters.forEach(ch => obs.observe(ch));

}

// ROI Calculator Global Logic
window.calculateROI = () => {
    const rf = (id) => parseFloat(document.getElementById(id)?.value) || 0;
    const rev = rf('base_revenue'), conv = rf('base_conversion')/100, aov = rf('base_aov');
    const srchRev = rev * 0.15;
    const srchTfc = (srchRev / aov) / conv;
    
    const cLift = rf('lever_conversion')/100, aInc = rf('lever_aov')/100;
    const bRec = rf('lever_bounce')/100, nRec = rf('lever_noresult')/100;
    
    const nConv = conv * (1 + cLift);
    const cImp = (srchTfc * nConv * aov) - srchRev;
    const aImp = (srchTfc * nConv) * (aov * (1 + aInc) - aov);
    const bImp = (srchTfc * 0.30) * bRec * nConv * (aov * (1 + aInc));
    const nImp = (srchTfc * 0.10) * nRec * nConv * (aov * (1 + aInc));
    
    const fmt = n => '$' + Math.round(n).toLocaleString();
    const set = (id, v) => { const el = document.getElementById(id); if(el) el.textContent = v; };
    
    set('output_conversion', fmt(cImp).substring(1));
    set('output_aov', fmt(aImp).substring(1));
    set('output_bounce', fmt(bImp).substring(1));
    set('output_noresult', fmt(nImp).substring(1));
    set('output_total_impact', fmt(cImp + aImp + bImp + nImp).substring(1));
};

// Bind listeners globally
document.addEventListener('input', (e) => {
    if (['base_revenue','base_conversion','base_aov'].includes(e.target.id)) window.calculateROI();
    if (e.target.id && e.target.id.startsWith('lever_')) {
        const valId = 'val_' + e.target.id.split('_')[1];
        const valEl = document.getElementById(valId);
        if (valEl) valEl.textContent = e.target.value;
        window.calculateROI();
    }
});
// Initial trigger after short delay
setTimeout(() => window.calculateROI(), 500);

if (document.readyState === 'loading') {

  document.addEventListener('DOMContentLoaded', _boot);

} else {

  _boot();

}

</script>
