<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COMPANY_NAME — MODULE_TITLE | Algolia Search Audit</title>
  <!-- BRAND_CSS injected here -->
  <style>
    /* Use only var(--*) tokens from algolia-brand.css — NO raw values */
    :root {
      --topbar-h: 52px;
      --breadcrumb-h: 44px;
      --blue-tint: rgba(0, 61, 255, 0.06);
    }

    body {
      font-family: var(--font-family);
      color: var(--gray);
      background: var(--light);
      margin: 0;
    }

    /* ── Fixed topbar ── */
    #topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--topbar-h);
      background: var(--gray);
      display: flex;
      align-items: center;
      padding: 0 var(--font-body);
      gap: var(--font-label);
      z-index: 200;
    }

    /* ── Fixed breadcrumb bar ── */
    #breadcrumb {
      position: fixed;
      top: var(--topbar-h);
      left: 0;
      right: 0;
      height: var(--breadcrumb-h);
      background: var(--white);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 var(--font-h4);
      font-size: var(--font-label);
      color: var(--mid);
      z-index: 100;
    }

    #breadcrumb .bc-back {
      color: var(--blue);
      text-decoration: none;
      font-weight: var(--weight-semibold);
      white-space: nowrap;
    }

    #breadcrumb .bc-back:hover {
      text-decoration: underline;
    }

    #breadcrumb .bc-sep {
      margin: 0 8px;
      color: var(--border);
    }

    #breadcrumb .bc-current {
      color: var(--gray);
      font-weight: var(--weight-semibold);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    #breadcrumb .bc-right {
      flex-shrink: 0;
      color: var(--mid);
      font-size: var(--font-label);
      margin-left: var(--font-body);
    }

    /* ── Main content area ── */
    #content {
      max-width: 860px;
      margin: 0 auto;
      padding: calc(var(--topbar-h) + var(--breadcrumb-h) + var(--font-body)) var(--font-h4) 80px;
    }

    /* ── Subtitle line ── */
    .module-subtitle {
      color: var(--mid);
      font-size: var(--font-label);
      margin-bottom: var(--font-h4);
    }

    /* ── Markdown content styles ── */
    #module-body h1 {
      color: var(--gray);
      border-bottom: 2px solid var(--border);
      padding-bottom: 8px;
      margin-top: var(--font-h3);
    }

    #module-body h2 {
      color: var(--gray);
      border-bottom: 2px solid var(--border);
      padding-bottom: 8px;
      margin-top: var(--font-h3);
    }

    #module-body h3 {
      color: var(--gray);
      margin-top: var(--font-h4);
    }

    #module-body table {
      width: 100%;
      border-collapse: collapse;
      font-size: var(--font-label);
      margin: var(--font-body) 0;
    }

    #module-body th {
      background: var(--gray);
      color: var(--white);
      padding: 10px var(--font-label);
      text-align: left;
    }

    #module-body td {
      padding: 10px var(--font-label);
      border-bottom: 1px solid var(--border);
    }

    #module-body tr:hover td {
      background: var(--light);
    }

    #module-body blockquote {
      border-left: 3px solid var(--blue);
      margin: var(--font-body) 0;
      padding: 12px var(--font-body);
      background: var(--blue-tint);
      color: var(--gray);
      border-radius: 0 var(--radius) var(--radius) 0;
    }

    #module-body code {
      background: var(--light);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: var(--font-label);
      border: 1px solid var(--border);
    }

    #module-body img {
      max-width: 100%;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin: var(--font-body) 0;
    }

    #module-body ul {
      padding-left: var(--font-h4);
      margin: var(--font-label) 0;
    }

    #module-body li {
      margin-bottom: 6px;
      line-height: 1.6;
    }

    #module-body p {
      line-height: 1.7;
      margin: var(--font-label) 0;
    }

    #module-body hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: var(--font-h4) 0;
    }

    /* ── Related findings section ── */
    #related-findings {
      margin-top: 48px;
      padding-top: var(--font-h4);
      border-top: 2px solid var(--border);
    }

    #related-findings h3 {
      font-size: var(--font-label);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--mid);
      font-weight: var(--weight-semibold);
      margin-bottom: var(--font-label);
    }

    .finding-chip {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      background: var(--blue-tint);
      color: var(--blue);
      font-size: var(--font-label);
      text-decoration: none;
      margin: 4px;
      border: 1px solid var(--blue);
      font-weight: var(--weight-semibold);
      transition: background 0.15s, color 0.15s;
    }

    .finding-chip:hover {
      background: var(--blue);
      color: var(--white);
      text-decoration: none;
    }

    /* ── Page footer ── */
    #page-footer {
      margin-top: 48px;
      padding-top: var(--font-body);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: var(--font-label);
      color: var(--mid);
    }

    #page-footer a {
      color: var(--blue);
      text-decoration: none;
      font-weight: var(--weight-semibold);
    }

    #page-footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <!-- ── Fixed topbar ── -->
  <header id="topbar">
    <img src="ALGOLIA_LOGO_B64" alt="Algolia" height="22" style="filter: brightness(0) invert(1);">
  </header>

  <!-- ── Fixed breadcrumb ── -->
  <nav id="breadcrumb">
    <a href="../index.html" class="bc-back">&#8592; COMPANY_NAME Search Audit</a>
    <span class="bc-sep">/</span>
    <span class="bc-current">MODULE_TITLE</span>
    <span class="bc-right">AUDIT_DATE &middot; Confidential &middot; Internal Use Only</span>
  </nav>

  <!-- ── Main content ── -->
  <main id="content">
    <h1 style="margin-bottom: 4px;">MODULE_TITLE</h1>
    <p class="module-subtitle">MODULE_FILE &middot; COMPANY_NAME Search Audit &middot; AUDIT_DATE</p>

    <div id="module-body">
      MODULE_CONTENT_HTML
    </div>

    <!-- ── Related findings ── -->
    <section id="related-findings">
      <h3>Referenced in Findings</h3>
      <div id="related-chips"><!-- populated by JS --></div>
    </section>

    <!-- ── Page footer ── -->
    <footer id="page-footer">
      <a href="../index.html">&#8592; Back to COMPANY_NAME Search Audit</a>
      <span>Part of: COMPANY_NAME Audit</span>
    </footer>
  </main>

  <script>
    const RELATED = RELATED_FINDINGS_JSON;
    const chips = document.getElementById('related-chips');
    if (RELATED && RELATED.length > 0) {
      chips.innerHTML = RELATED.map(function(f) {
        return '<a class="finding-chip" href="../index.html#finding-' + f.id.toLowerCase() + '">' + f.id + ': ' + f.title + '</a>';
      }).join('');
    } else {
      chips.innerHTML = '<span style="color: var(--mid); font-size: var(--font-label);">No direct finding references.</span>';
    }
  </script>
</body>
</html>
